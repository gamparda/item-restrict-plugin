name: ItemRestrict
version: ${project.version}
main: io.github.sunglogbag81.itemrestrict.ItemRestrictPlugin
api-version: '1.21'
author: sunglogbag81
description: 보유/조합/사용을 막는 아이템 제한 플러그인
commands:
  itemrestrict:
    description: 아이템 제한 플러그인 관리 명령어
    usage: /itemrestrict [reload|scan|list]
    aliases: [아이템제한, itemban]
permissions:
  itemrestrict.admin:
    description: 아이템 제한 관리자 명령어를 사용할 수 있습니다.
    default: op
  itemrestrict.bypass:
    description: 아이템 제한을 우회합니다. OP도 자동 우회됩니다.
    default: op
