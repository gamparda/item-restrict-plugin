# ==============================================================
# ItemRestrict 설정 파일
# - OP는 기본적으로 제한 대상에서 제외됩니다.
# - itemrestrict.bypass 권한을 가진 플레이어도 제한을 우회합니다.
# - restricted-materials에 적은 아이템은 보유/획득/조합/사용/설치가 차단됩니다.
# ==============================================================

settings:
  # true면 OP는 모든 제한을 우회합니다.
  op-bypass: true

  # true면 제한 아이템을 발견했을 때 인벤토리에서 삭제합니다.
  # false면 삭제하지 않고 사용/획득/조합만 차단합니다.
  remove-restricted-items: true

  # true면 접속 시 인벤토리를 검사해서 제한 아이템을 제거합니다.
  scan-on-join: true

  # true면 인벤토리 클릭/닫기 후에도 검사합니다.
  scan-on-inventory-actions: true

  # true면 삭제된 아이템 수를 플레이어에게 안내합니다.
  notify-removal: true

# 제한할 바닐라 Material 이름을 적으세요.
# 예: BEDROCK, BARRIER, COMMAND_BLOCK, ELYTRA, TNT
restricted-materials:
  - BEDROCK
  - BARRIER
  - COMMAND_BLOCK
  - CHAIN_COMMAND_BLOCK
  - REPEATING_COMMAND_BLOCK
  - COMMAND_BLOCK_MINECART

messages:
  prefix: "&c[아이템제한] &f"
  no-permission: "&c권한이 없습니다."
  config-reloaded: "&a설정을 다시 불러왔습니다."
  list-header: "&e제한 아이템 목록: &f%items%"
  blocked-pickup: "&c이 아이템은 획득할 수 없습니다."
  blocked-use: "&c이 아이템은 사용할 수 없습니다."
  blocked-craft: "&c제한 아이템이 포함되어 조합할 수 없습니다."
  blocked-inventory: "&c제한 아이템은 보유할 수 없습니다."
  removed-items: "&c제한 아이템 %amount%개가 인벤토리에서 제거되었습니다."
  scanned-player: "&a%player%님의 인벤토리를 검사했습니다. 제거 수: %amount%"
  player-not-found: "&c플레이어를 찾을 수 없습니다: %player%"
  usage: "&e/itemrestrict reload | /itemrestrict list | /itemrestrict scan [player]"
